name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual run from GitHub Web UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install Node.js Dependencies
        run: |
          npm install

      - name: Prepare Dummy Web Assets for Capacitor
        run: |
          mkdir -p out
          echo "<html><body>DPS Damanjodi Mobile Portal</body></html>" > out/index.html

      - name: Sync Capacitor Configurations
        run: |
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dps-student-portal-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Commit and Push Compiled APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk public/dps-student-portal.apk
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/dps-student-portal.apk
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-build: Update student portal Android APK [skip ci]"
            git push origin main
          fi
